];

const lista = document.getElementById("lista");

let categorias = {};

productos.forEach(p => {
  if (!categorias[p.categoria]) categorias[p.categoria] = [];
  categorias[p.categoria].push(p);
});

for (let cat in categorias) {
  lista.innerHTML += `<div class="categoria">${cat}</div>`;
  
  categorias[cat].forEach(p => {
    lista.innerHTML += `
      <div class="producto">
        <b>${p.nombre}</b><br>
        $${p.precio}<br><br>
        Cantidad: <input type="number" id="${p.nombre}" value="0" min="0">
      </div>
    `;
  });
}

function enviarPedido(){
  let mensaje = "Hola, quiero pedir:%0A";
  
  for (let p of productos){
    let cantidad = document.getElementById(p.nombre).value;
    
    if(cantidad > 0){
      mensaje += `${p.nombre} x ${cantidad}%0A`;
    }
  }

  window.open("https://wa.me/5493456556595?text=" + mensaje);
}
